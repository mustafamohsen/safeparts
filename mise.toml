# Dev toolchain for the Rust, WASM, web, docs, desktop, and native macOS apps.
[tools]
# Rust 2024 workspace; include the browser WASM target.
rust = { version = "1.93.0", targets = "wasm32-unknown-unknown", components = "rustfmt,clippy" }
# JS runtime/package manager used by web, docs, and desktop.
bun = "1.3.11"
# WASM build tools used by web/scripts/build-wasm.sh.
"cargo:wasm-pack" = "0.15.0"
"cargo:wasm-bindgen-cli" = "0.2.108"

[env]
# Keep tool output readable in local terminals and CI logs.
CARGO_TERM_COLOR = "always"
# Prefer local Stagehand/browser automation over Playwright defaults.
STAGEHAND_ENV = "LOCAL"
# Default docs path consumed by the Vite web app.
VITE_HELP_URL = "/help/"

# Project shortcuts; run with `mise run <name>` or `mise <name>`.
[tasks.setup]
description = "Install local dependencies."
run = [
  "bun install --cwd web",
  "bun install --cwd web/help",
  "bun install --cwd desktop",
]

[tasks.doctor]
description = "Check local developer toolchain and common setup issues."
run = "python3 scripts/dev/doctor.py"

[tasks."dx:verify"]
description = "Check AGENTS/docs structure, lockfiles, generated artifacts, and desktop parity."
run = "python3 scripts/dev/verify_dx.py"

[tasks.fmt]
description = "Format Rust code."
run = "cargo fmt --all"

[tasks.lint]
description = "Run CI-style Rust linting."
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run Rust tests."
run = "cargo test --all-features"

[tasks.check]
description = "Run Rust format, lint, and tests."
depends = ["verify:rust"]

[tasks.verify]
description = "Run the full local verification gate."
depends = ["verify:rust", "web:build", "docs:build", "desktop:check", "macos:check", "dx:verify"]

[tasks."verify:rust"]
description = "Run Rust format, lint, and tests."
depends = ["fmt-check", "lint", "test"]

[tasks."fmt-check"]
description = "Check Rust formatting."
run = "cargo fmt --all -- --check"

[tasks."web:dev"]
description = "Start the web app."
dir = "web"
run = "bun run dev"

[tasks."web:typecheck"]
description = "Type-check the web app."
dir = "web"
run = "bun run typecheck"

[tasks."web:build"]
description = "Build WASM and the web app."
dir = "web"
run = ["bun run build:wasm", "bun run typecheck", "bun run build"]

[tasks."web:test:smoke"]
description = "Run web smoke tests."
dir = "web"
run = "bun run test:e2e:smoke"

[tasks."docs:dev"]
description = "Start the help docs."
dir = "web/help"
run = "bun run dev"

[tasks."docs:build"]
description = "Build the help docs."
dir = "web/help"
run = "bun run build"

[tasks."macos:prepare"]
description = "Build and regenerate the native macOS UniFFI bridge."
run = "if [ \"$(uname -s)\" = Darwin ]; then macos/scripts/prepare.sh; else echo 'macos:prepare requires macOS' >&2; exit 1; fi"

[tasks."macos:check"]
description = "Build and test the native macOS app."
run = "if [ \"$(uname -s)\" = Darwin ]; then macos/scripts/prepare.sh && swift build --package-path macos && macos/scripts/verify-binary.sh && swift test --package-path macos; else echo 'macos:check skipped: requires macOS'; fi"

[tasks."desktop:dev"]
description = "Start the desktop app."
dir = "desktop"
run = "bun run tauri:dev"

[tasks."desktop:typecheck"]
description = "Type-check the desktop frontend."
dir = "desktop"
run = "bun run typecheck"

[tasks."desktop:parity"]
description = "Check copied desktop UI files against the web UI source."
run = "python3 scripts/dev/check_desktop_parity.py"

[tasks."desktop:build"]
description = "Build the desktop frontend."
dir = "desktop"
run = "bun run build"

[tasks."desktop:check"]
description = "Run desktop frontend typecheck, build, and web parity check."
depends = ["desktop:parity", "desktop:typecheck", "desktop:build"]
