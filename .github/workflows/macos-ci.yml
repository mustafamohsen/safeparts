name: native macOS ci

on:
  push:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/safeparts_core/**'
      - 'crates/safeparts_swift/**'
      - 'macos/**'
      - 'mise.toml'
      - '.github/workflows/macos-ci.yml'
      - '.github/workflows/release.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/safeparts_core/**'
      - 'crates/safeparts_swift/**'
      - 'macos/**'
      - 'mise.toml'
      - '.github/workflows/macos-ci.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  native-macos:
    name: native macOS build and package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with Swift 6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify Swift toolchain
        run: swift --version | grep -E 'Apple Swift version (6|[7-9]|[1-9][0-9])'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare native bridge
        run: macos/scripts/prepare.sh

      - name: Check generated binding drift
        run: git diff --exit-code -- macos/Generated macos/Sources/SafepartsKit/Generated.swift

      - name: Build and test native app
        run: |
          swift build --package-path macos
          macos/scripts/verify-binary.sh
          swift test --package-path macos

      - name: Check release scripts
        run: |
          bash -n macos/scripts/package-release.sh
          bash -n macos/scripts/validate-release.sh

      - name: Package unsigned universal native DMG
        run: macos/scripts/package-release.sh 0.0.0

      - name: Upload package smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeparts-native-macos-ci
          path: dist/release/safeparts-native-macos-universal-0.0.0.dmg
          if-no-files-found: error
