name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for naming (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Test
        run: cargo test --all-features

  build:
    name: build (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
          - os: windows-latest
            id: windows
          - os: macos-14
            id: macos-x86_64
            target: x86_64-apple-darwin
            arch: x86_64
          - os: macos-14
            id: macos-aarch64
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Rust target (if needed)
        if: matrix.target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release -p safeparts -p safeparts_tui --target ${{ matrix.target }}
          else
            cargo build --release -p safeparts -p safeparts_tui
          fi

      - name: Package
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            python scripts/release/package.py --version "${{ env.RELEASE_VERSION }}" --target "${{ matrix.target }}" --arch "${{ matrix.arch }}"
          else
            python scripts/release/package.py --version "${{ env.RELEASE_VERSION }}" --arch "${{ matrix.arch }}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: safeparts-${{ matrix.id }}
          path: dist/release/*

  desktop:
    name: desktop (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-desktop
            os: ubuntu-latest
            bundles: appimage,deb,rpm
            artifact_name: safeparts-desktop-linux
            artifact_paths: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
          - id: windows-desktop
            os: windows-latest
            bundles: nsis,msi
            artifact_name: safeparts-desktop-windows
            artifact_paths: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi
          - id: macos-x86_64-desktop
            os: macos-13
            bundles: dmg
            artifact_name: safeparts-desktop-macos-x86_64
            artifact_paths: |
              target/release/bundle/dmg/*.dmg
          - id: macos-aarch64-desktop
            os: macos-14
            bundles: dmg
            artifact_name: safeparts-desktop-macos-aarch64
            artifact_paths: |
              target/release/bundle/dmg/*.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm \
            wget

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - name: Build desktop bundles
        working-directory: desktop
        shell: bash
        run: |
          extra_args=()
          if [ "${{ runner.os }}" = "macOS" ]; then
            extra_args+=(--no-sign)
          fi
          bun run tauri:build -- --ci --bundles "${{ matrix.bundles }}" "${extra_args[@]}"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs:
      - build
      - desktop
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          out_dir = Path('dist/release')
          files = sorted(
              p
              for p in out_dir.rglob('*')
              if p.is_file() and p.name != 'SHA256SUMS.txt'
          )

          def sha256_hex(path: Path) -> str:
              h = hashlib.sha256()
              with path.open('rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          sums = out_dir / 'SHA256SUMS.txt'
          with sums.open('w', encoding='utf-8') as f:
              for p in files:
                  f.write(f"{sha256_hex(p)}  {p.relative_to(out_dir).as_posix()}\n")
          print(f"wrote {sums}")
          PY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/**/*.tar.gz
            dist/release/**/*.zip
            dist/release/**/*.AppImage
            dist/release/**/*.deb
            dist/release/**/*.rpm
            dist/release/**/*.dmg
            dist/release/**/*.msi
            dist/release/**/*.exe
            dist/release/SHA256SUMS.txt
