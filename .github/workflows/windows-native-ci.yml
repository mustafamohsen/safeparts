name: native Windows interoperability ci

on:
  push:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/safeparts_core/**'
      - 'crates/safeparts_uniffi/**'
      - 'windows/**'
      - '.github/workflows/windows-native-ci.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/safeparts_core/**'
      - 'crates/safeparts_uniffi/**'
      - 'windows/**'
      - '.github/workflows/windows-native-ci.yml'
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'

jobs:
  interop-smoke:
    name: C# and Rust DLL smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test platform-neutral bridge
        run: cargo test --locked -p safeparts_uniffi

      - name: Check platform-neutral bridge
        run: cargo clippy --locked -p safeparts_uniffi --all-targets --all-features -- -D warnings

      - name: Check generated C# binding
        run: python windows/scripts/prepare.py --check

      - name: Test Windows application model
        working-directory: windows
        run: dotnet test Safeparts.AppModel.Tests/Safeparts.AppModel.Tests.csproj --configuration Release

      - name: Verify accessibility source contract
        run: python windows/scripts/verify-accessibility.py

      - name: Build native Windows app
        working-directory: windows
        run: dotnet build Safeparts.App/Safeparts.App.csproj --configuration Release -p:Platform=x64 -p:RuntimeIdentifier=win-x64

      - name: Launch native Windows app
        shell: pwsh
        run: windows/scripts/launch-smoke.ps1

      - name: Build C# smoke executable
        working-directory: windows
        run: dotnet build Safeparts.InteropSmoke/Safeparts.InteropSmoke.csproj --configuration Release

      - name: Run C# against the real Rust DLL
        working-directory: windows
        shell: pwsh
        run: |
          $env:SAFEPARTS_NATIVE_DIR = (Resolve-Path ../target/debug)
          dotnet run --project Safeparts.InteropSmoke/Safeparts.InteropSmoke.csproj --configuration Release --no-build

      - name: Package self-contained x64 preview
        run: python windows/scripts/package-release.py 0.2.0 x64

      - name: Test exact x64 package
        shell: pwsh
        run: |
          $package = (Resolve-Path target/native-windows-release/x64/extract/safeparts-native-windows-x64-0.2.0).Path
          windows/scripts/launch-package-smoke.ps1 -PackageRoot $package
          $env:SAFEPARTS_NATIVE_DIR = $package
          dotnet run --project windows/Safeparts.InteropSmoke/Safeparts.InteropSmoke.csproj --configuration Release --no-build

      - name: Upload x64 package smoke
        uses: actions/upload-artifact@v4
        with:
          name: safeparts-native-windows-x64-package-smoke
          path: dist/release/safeparts-native-windows-x64-0.2.0.zip
          if-no-files-found: error

  arm64-package-smoke:
    name: native ARM64 package smoke
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Assert native ARM64 runner
        shell: pwsh
        run: |
          if ([Runtime.InteropServices.RuntimeInformation]::OSArchitecture -ne 'Arm64') { throw 'ARM64 package must execute on an ARM64 runner.' }

      - name: Check generated binding
        run: python windows/scripts/prepare.py --check

      - name: Test Windows application model
        working-directory: windows
        run: dotnet test Safeparts.AppModel.Tests/Safeparts.AppModel.Tests.csproj --configuration Release

      - name: Build interoperability smoke
        working-directory: windows
        run: dotnet build Safeparts.InteropSmoke/Safeparts.InteropSmoke.csproj --configuration Release

      - name: Package self-contained ARM64 preview
        run: python windows/scripts/package-release.py 0.2.0 arm64

      - name: Test exact ARM64 package
        shell: pwsh
        run: |
          $package = (Resolve-Path target/native-windows-release/arm64/extract/safeparts-native-windows-arm64-0.2.0).Path
          windows/scripts/launch-package-smoke.ps1 -PackageRoot $package
          $env:SAFEPARTS_NATIVE_DIR = $package
          dotnet run --project windows/Safeparts.InteropSmoke/Safeparts.InteropSmoke.csproj --configuration Release --no-build

      - name: Upload ARM64 package smoke
        uses: actions/upload-artifact@v4
        with:
          name: safeparts-native-windows-arm64-package-smoke
          path: dist/release/safeparts-native-windows-arm64-0.2.0.zip
          if-no-files-found: error
